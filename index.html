<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>CPS - Услуги и сервисы</title>
  </head>
  <body>
    <header>
      <div class="header__main">
        <img src="images/menu.svg" alt="меню" class="header_menu" />
        <img src="images/logo.svg" alt="логотип" class="header_logo" />

        <div class="divider"></div>
      </div>

      <div class="header__actions">
        <img src="images/repair.svg" alt="ремонт" class="header_repair" />
        <img src="images/search.svg" alt="поиск" class="header_search" />
      </div>
    </header>
    <main>
      <section class="services">
        <div class="services__header">
          <div class="services__line"></div>
          <h2 class="services__title">Услуги и сервисы</h2>
        </div>
        <div class="services__tabs">
          <button class="services__tab">Ремонтируемые устройства</button>
          <button class="services__tab">Дополнительные услуги</button>
          <button class="services__tab">Цены на услуги</button>
          <button class="services__tab">Специальные цены</button>
          <button class="services__tab">Адреса сервисных центров</button>
        </div>
      </section>
    </main>
  </body>
</html>
